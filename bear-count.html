<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bear Count</title>
<style>
  :root {
    --bg: #1a140d;
    --card: #2a2018;
    --card-2: #352a1f;
    --accent: #d39a4f;
    --accent-press: #b97f33;
    --text: #f4ecdf;
    --muted: #b0a18c;
    --danger: #c0563f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
    max-width: 560px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    padding: 20px 0 8px;
  }
  h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: 0.5px;
  }
  .total {
    font-size: 15px;
    color: var(--muted);
    margin-top: 4px;
  }
  .total b { color: var(--accent); font-size: 18px; }

  .add-row {
    display: flex;
    gap: 8px;
    margin: 16px 0;
  }
  .add-row input {
    flex: 1;
    min-width: 0;
    font-size: 17px;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #4a3c2c;
    background: var(--card);
    color: var(--text);
  }
  .add-row input::placeholder { color: var(--muted); }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
  }
  .btn-add {
    background: var(--accent);
    color: #1a140d;
    font-size: 17px;
    font-weight: 600;
    padding: 0 18px;
    border-radius: 12px;
  }
  .btn-add:active { background: var(--accent-press); }

  ul { list-style: none; padding: 0; margin: 0; }
  .friend {
    background: var(--card);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .friend .info { flex: 1; min-width: 0; }
  .friend .name {
    font-size: 18px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .friend .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .count {
    font-size: 30px;
    font-weight: 700;
    min-width: 44px;
    text-align: center;
    color: var(--accent);
  }
  .stepper { display: flex; gap: 8px; }
  .step {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    font-size: 26px;
    font-weight: 700;
    background: var(--card-2);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step.plus { background: var(--accent); color: #1a140d; }
  .step.plus:active { background: var(--accent-press); }
  .step.minus:active { background: #483826; }
  .step:disabled { opacity: 0.35; }

  .friend .remove {
    background: none;
    color: var(--muted);
    font-size: 20px;
    padding: 4px 8px;
    line-height: 1;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 16px;
    font-size: 16px;
    line-height: 1.5;
  }
  .footer {
    margin-top: 8px;
    text-align: center;
  }
  .btn-reset {
    background: none;
    color: var(--danger);
    font-size: 15px;
    padding: 10px 16px;
  }
</style>
</head>
<body>
  <header>
    <h1>🐻 Bear Count</h1>
    <div class="total">Round total: <b id="grandTotal">0</b> bears</div>
  </header>

  <div class="add-row">
    <input id="nameInput" type="text" placeholder="Add a friend…" autocomplete="off" enterkeyhint="done" maxlength="24">
    <button class="btn-add" id="addBtn">Add</button>
  </div>

  <ul id="list"></ul>

  <div class="footer">
    <button class="btn-reset" id="resetBtn">Reset round</button>
  </div>

<script>
  // --- State ---------------------------------------------------------------
  // Each friend is { id, name, count }. We keep it in a plain array and save
  // it to the browser's localStorage so the count survives closing the tab.
  const STORAGE_KEY = "bearCount.v1";
  let friends = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(friends));
  }

  // --- Actions -------------------------------------------------------------
  function addFriend(name) {
    name = name.trim();
    if (!name) return;
    friends.push({ id: Date.now() + "-" + Math.random().toString(36).slice(2), name, count: 0 });
    save();
    render();
  }

  function changeCount(id, delta) {
    const f = friends.find(x => x.id === id);
    if (!f) return;
    f.count = Math.max(0, f.count + delta);
    save();
    render();
  }

  function removeFriend(id) {
    const f = friends.find(x => x.id === id);
    if (f && f.count > 0 && !confirm('Remove ' + f.name + ' (' + f.count + ' bears)?')) return;
    friends = friends.filter(x => x.id !== id);
    save();
    render();
  }

  function resetRound() {
    if (!friends.length) return;
    if (!confirm("Reset everyone's count to 0?")) return;
    friends.forEach(f => f.count = 0);
    save();
    render();
  }

  // --- Render --------------------------------------------------------------
  const list = document.getElementById("list");
  const grandTotal = document.getElementById("grandTotal");

  function render() {
    const total = friends.reduce((sum, f) => sum + f.count, 0);
    grandTotal.textContent = total;

    if (!friends.length) {
      list.innerHTML = '<li class="empty">No one at the table yet.<br>Add a friend to start counting bears.</li>';
      return;
    }

    list.innerHTML = "";
    friends.forEach(f => {
      const li = document.createElement("li");
      li.className = "friend";
      li.innerHTML = `
        <div class="info">
          <div class="name"></div>
          <div class="sub"></div>
        </div>
        <div class="count">${f.count}</div>
        <div class="stepper">
          <button class="step minus" aria-label="Remove a bear" ${f.count === 0 ? "disabled" : ""}>−</button>
          <button class="step plus" aria-label="Add a bear">+</button>
        </div>
        <button class="remove" aria-label="Remove friend">✕</button>
      `;
      // textContent (not innerHTML) so a friend's name can't inject markup.
      li.querySelector(".name").textContent = f.name;
      li.querySelector(".sub").textContent = f.count === 1 ? "1 bear" : f.count + " bears";
      li.querySelector(".minus").addEventListener("click", () => changeCount(f.id, -1));
      li.querySelector(".plus").addEventListener("click", () => changeCount(f.id, 1));
      li.querySelector(".remove").addEventListener("click", () => removeFriend(f.id));
      list.appendChild(li);
    });
  }

  // --- Wire up the controls ------------------------------------------------
  const nameInput = document.getElementById("nameInput");
  document.getElementById("addBtn").addEventListener("click", () => {
    addFriend(nameInput.value);
    nameInput.value = "";
    nameInput.focus();
  });
  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      addFriend(nameInput.value);
      nameInput.value = "";
    }
  });
  document.getElementById("resetBtn").addEventListener("click", resetRound);

  render();
</script>
</body>
</html>
